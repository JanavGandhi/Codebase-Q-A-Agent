<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codebase Q&A Agent</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-window {
      width: 480px;
      height: 680px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d1117;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #3fb950;
    }

    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #e6edf3;
    }

    .header-sub {
      font-size: 12px;
      color: #8b949e;
      margin-left: auto;
    }

    .file-selector {
      padding: 10px 16px;
      border-bottom: 1px solid #30363d;
      background: #0d1117;
    }

    .file-selector label {
      font-size: 11px;
      color: #8b949e;
      display: block;
      margin-bottom: 5px;
    }

    .file-selector select {
      width: 100%;
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .mode-tabs {
      padding: 8px 16px;
      border-bottom: 1px solid #30363d;
      display: flex;
      gap: 6px;
    }

    .tab {
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #30363d;
      background: transparent;
      color: #8b949e;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab.active {
      background: #1f6feb22;
      border-color: #1f6feb;
      color: #58a6ff;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg-user {
      display: flex;
      justify-content: flex-end;
    }

    .msg-user .bubble {
      background: #1f6feb;
      color: #ffffff;
      padding: 9px 13px;
      border-radius: 14px 14px 3px 14px;
      max-width: 80%;
      font-size: 13px;
      line-height: 1.5;
    }

    .msg-ai {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }

    .ai-avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      background: #21262d;
      border: 1px solid #30363d;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: #8b949e;
      flex-shrink: 0;
    }

    .msg-ai .bubble {
      background: #21262d;
      color: #e6edf3;
      padding: 9px 13px;
      border-radius: 3px 14px 14px 14px;
      max-width: 85%;
      font-size: 13px;
      line-height: 1.6;
    }

    .bubble p { margin: 0 0 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      font-family: "Cascadia Code", "Fira Code", monospace;
      font-size: 11px;
      background: #0d1117;
      padding: 1px 5px;
      border-radius: 3px;
      color: #79c0ff;
    }
    .bubble pre {
      background: #0d1117;
      border-radius: 6px;
      padding: 10px;
      overflow-x: auto;
      margin: 8px 0;
      border: 1px solid #30363d;
    }
    .bubble pre code {
      background: none;
      padding: 0;
      color: #e6edf3;
    }

    .sources {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #30363d;
      font-size: 11px;
      color: #8b949e;
    }

    .source-tag {
      display: inline-block;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 2px 6px;
      margin: 2px 3px 2px 0;
      font-family: monospace;
      font-size: 10px;
      color: #58a6ff;
    }

    .typing {
      display: flex;
      gap: 4px;
      padding: 8px 4px;
      align-items: center;
    }

    .typing span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #8b949e;
      animation: blink 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }

    .input-row {
      padding: 12px 16px;
      border-top: 1px solid #30363d;
      display: flex;
      gap: 8px;
      background: #0d1117;
    }

    .input-row input {
      flex: 1;
      background: #21262d;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }

    .input-row input:focus { border-color: #1f6feb; }
    .input-row input::placeholder { color: #484f58; }

    .input-row button {
      background: #1f6feb;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.15s;
    }

    .input-row button:hover { background: #388bfd; }
    .input-row button:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

    .welcome {
      text-align: center;
      color: #484f58;
      font-size: 13px;
      margin: auto;
      padding: 2rem;
      line-height: 1.8;
    }
  </style>
</head>
<body>
<div class="chat-window">

  <div class="header">
    <div class="status-dot"></div>
    <span class="header-title">Codebase Q&A Agent</span>
    <span class="header-sub" id="repo-label">requests repo</span>
  </div>

  <div class="file-selector">
    <label>current file</label>
    <select id="file-select">
      {% for f in files %}
      <option value="{{ f }}">{{ f }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="mode-tabs">
    <button class="tab active" data-mode="ask">Ask anything</button>
    <button class="tab" data-mode="explain_file">Explain file</button>
    <button class="tab" data-mode="explain_line">Explain snippet</button>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      Select a file, choose a mode,<br>and ask anything about the codebase.
    </div>
  </div>

  <div class="input-row">
    <input type="text" id="user-input"
           placeholder="Ask about this file..." />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>

</div>

<script>
  let currentMode = "ask";

  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentMode = tab.dataset.mode;

      const input = document.getElementById("user-input");
      if (currentMode === "explain_file") {
        input.placeholder = "Click Send to explain the selected file...";
      } else if (currentMode === "explain_line") {
        input.placeholder = "Paste a code snippet to explain...";
      } else {
        input.placeholder = "Ask about this file...";
      }
    });
  });

  document.getElementById("user-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendMessage() {
    const input    = document.getElementById("user-input");
    const question = input.value.trim();
    const filepath = document.getElementById("file-select").value;
    const btn      = document.getElementById("send-btn");

    if (currentMode !== "explain_file" && !question) return;

    const displayText = currentMode === "explain_file"
      ? `Explain: ${filepath}`
      : question;

    appendUserMsg(displayText);
    input.value = "";
    btn.disabled = true;

    const typingEl = appendTyping();

    const payload = {
      mode:     currentMode,
      question: question,
      filepath: filepath,
      snippet:  currentMode === "explain_line" ? question : "",
    };

    fetch("/api/chat", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload),
    })
    .then(r => r.json())
    .then(data => {
      typingEl.remove();
      if (data.error) {
        appendAiMsg("Error: " + data.error, []);
      } else {
        appendAiMsg(data.answer, data.sources || []);
      }
    })
    .catch(err => {
      typingEl.remove();
      appendAiMsg("Connection error — is the Flask server running?", []);
    })
    .finally(() => { btn.disabled = false; });
  }

  function appendUserMsg(text) {
    const msgs = document.getElementById("messages");
    const welcome = msgs.querySelector(".welcome");
    if (welcome) welcome.remove();

    const div = document.createElement("div");
    div.className = "msg-user";
    div.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendAiMsg(markdown, sources) {
    const msgs = document.getElementById("messages");
    const div  = document.createElement("div");
    div.className = "msg-ai";

    let sourcesHtml = "";
    if (sources && sources.length) {
      const tags = sources.map(s =>
        `<span class="source-tag">${escHtml(s.name)} · ${escHtml(s.filepath)}:${s.start}</span>`
      ).join("");
      sourcesHtml = `<div class="sources">Sources: ${tags}</div>`;
    }

    div.innerHTML = `
      <div class="ai-avatar">AI</div>
      <div class="bubble">
        ${marked.parse(markdown)}
        ${sourcesHtml}
      </div>`;

    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendTyping() {
    const msgs = document.getElementById("messages");
    const div  = document.createElement("div");
    div.className = "msg-ai";
    div.innerHTML = `
      <div class="ai-avatar">AI</div>
      <div class="bubble">
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      </div>`;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
</script>
</body>
</html>
